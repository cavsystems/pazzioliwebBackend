spring.application.name=pazzioli-web-backend

# ──────────────────────────────────────────────────────────────────
# Configuración de base de datos (override con --spring.config.additional-location en producción)
# ──────────────────────────────────────────────────────────────────
spring.datasource.host=localhost
spring.datasource.port=3306
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.default-tenant=cavsystems
spring.datasource.url=jdbc:mysql://${spring.datasource.host}:${spring.datasource.port}/administrador?serverTimezone=America/Bogota
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ──────────────────────────────────────────────────────────────────
# Backups de schemas (mysqldump)
# Sobrescribir en producción según la ruta y el binario disponible.
# ──────────────────────────────────────────────────────────────────
app.backup.path=C:\\backups
app.backup.mysqldump=mysqldump
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=always
#spring.sql.init.schema-locations=classpath:schma.sql
logging.level.org.hibernate.jpa.boot.internal.EntityManagerFactoryBuilderImpl=WARN
logging.level.org.hibernate.metamodel.model.domain.internal=WARN
logging.level.org.springframework.boot.autoconfigure.orm.jpa=WARN
spring.jpa.packages-to-scan=com.pazzioliweb.usuariosbacken.entyti,com.pazzioliweb.productobacken.entyti

# Spring Security en INFO para evitar imprimir el avatar del usuario en cada request.
# Si necesitas debug, sube a DEBUG (no TRACE, que dumpea el Authentication completo).
logging.level.org.springframework.security=INFO


server.port=4000
server.address=0.0.0.0
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jackson.time-zone=America/Bogota
#datos de  configuracion de redix
spring.redis.host=localhost
spring.redis.port=6379
app.test.property=hola
spring.jpa.packages-to-scan=com.pazzioliweb.productobacken.entyti

spring.jpa.open-in-view=false

spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=false
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

