spring.application.name=pazzioli-web-backend

spring.datasource.host=localhost
spring.datasource.port=3306
spring.datasource.username=root
spring.datasource.password=root

#spring.datasource.url=jdbc:mysql://localhost:3306/administrador?serverTimezone=America/Bogota
spring.datasource.url=jdbc:mysql://localhost:3306/administrador?serverTimezone=America/Bogota
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=always
#spring.sql.init.schema-locations=classpath:schma.sql
logging.level.org.hibernate.jpa.boot.internal.EntityManagerFactoryBuilderImpl=DEBUG
logging.level.org.hibernate.metamodel.model.domain.internal=DEBUG
logging.level.org.springframework.boot.autoconfigure.orm.jpa=TRACE
spring.jpa.packages-to-scan=com.pazzioliweb.usuariosbacken.entyti,com.pazzioliweb.productobacken.entyti

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security=TRACE


server.port=4000
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jackson.time-zone=America/Bogota
#datos de  configuracion de redix
spring.redis.host=localhost
spring.redis.port=6379
app.test.property=hola
spring.jpa.packages-to-scan=com.pazzioliweb.productobacken.entyti

spring.jpa.open-in-view=false

spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=false
eureka.client.enabled=false
spring.cloud.discovery.enabled=false
productos.module.url=http://localhost:4000

# ConfiguraciÛn de tamaÒo m·ximo para im·genes base64
server.tomcat.max-http-form-post-size=10485760
server.tomcat.max-swallow-size=10485760
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.max-file-size=10MB
